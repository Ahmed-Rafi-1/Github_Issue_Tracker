<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Github Issue Tracker</title>
    <link
      rel="shortcut icon"
      href="./assets/github-logo.png"
      type="image/x-icon"
    />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap"
      rel="stylesheet"
    />

    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <link rel="stylesheet" href="./style/style.css" />
  </head>
  <body>
    <main>
      <section class="min-h-screen sm:h-screen flex justify-center items-center px-4 sm:px-0 py-8 sm:py-0">
        <div
          class="fieldset bg-base-200 border-base-300 rounded-box w-full sm:w-xs border p-4"
        >
          <div class="flex flex-col text-center items-center mb-6">
            <img src="./assets/github-logo.png" alt="logo" class="mb-6" />
            <h2 class="font-semibold text-2xl">GitHub Issues Tracker</h2>
            <p class="font-normal text-base text-[#64748b]">
              Sign in to manage your issues
            </p>
          </div>
          <label class="label font-medium text-black">Username</label>
          <input
            id="loginUsername"
            type="email"
            class="input rounded-lg w-full"
            placeholder="Enter Username"
          />

          <label class="label font-medium text-black">Password</label>
          <input
            id="loginPassword"
            type="password"
            class="input rounded-lg w-full"
            placeholder="Enter Password"
          />

          <button id="loginBtn" class="btn btn-primary mt-4 rounded-lg w-full">Login</button>

          <div class="flex items-center w-full mx-auto gap-3 my-6">
            <div class="flex-1 border-t border-gray-300"></div>
            <span class="text-gray-500 text-sm">OR</span>
            <div class="flex-1 border-t border-gray-300"></div>
          </div>
          <div class="text-center">
            <p class="text-xs text-gray-500 mb-3">Demo Credentials:</p>
            <p><span class="font-bold">Username:</span> admin</p>
            <p><span class="font-bold">Password:</span> admin123</p>
          </div>
        </div>
      </section>
    </main>
    <script src="./script/login.js"></script>
  </body>
</html>
