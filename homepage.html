<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Github Issue Tracker</title>
    <link
      rel="shortcut icon"
      href="./assets/github-logo.png"
      type="image/x-icon"
    />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap"
      rel="stylesheet"
    />

    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />

    <link rel="stylesheet" href="./style/style.css" />
  </head>
  <body>
    <header class="bg-base-100 shadow-sm py-2 sm:py-0">
      <div class="navbar flex flex-col sm:flex-row justify-between w-11/12 mx-auto gap-4 sm:gap-0">
        <div class="flex items-center gap-2">
          <img src="./assets/github-logo.png" alt="logo" class="w-9 h-9" />
          <p class="font-semibold text-xl sm:text-2xl">GitHub Issues Tracker</p>
        </div>
        <div class="flex w-full sm:w-auto gap-2">
          <label class="input w-full sm:w-auto flex-1">
            <svg
              class="h-[1em] opacity-50"
              xmlns="http://www.w3.org/2000/svg"
              viewBox="0 0 24 24"
            >
              <g
                stroke-linejoin="round"
                stroke-linecap="round"
                stroke-width="2.5"
                fill="none"
                stroke="currentColor"
              >
                <circle cx="11" cy="11" r="8"></circle>
                <path d="m21 21-4.3-4.3"></path>
              </g>
            </svg>
            <input
              id="search-input"
              type="search"
              required
              placeholder="Search"
              class="w-full"
            />
          </label>
          <button id="btn-search" class="btn btn-primary whitespace-nowrap">
            <i class="fa-solid fa-plus"></i> <span class="hidden sm:inline">New Issue</span>
          </button>
        </div>
      </div>
    </header>

    <main class="w-11/12 mx-auto mt-6 sm:mt-14">
      <div class="w-full shadow-sm bg-slate-50 p-4 sm:p-6 rounded-lg mb-4 flex flex-wrap gap-2">
        <button
          onclick="toggleStyle('btn-all')"
          id="btn-all"
          class="btn btn-primary flex-1 sm:flex-none"
        >
          All
        </button>
        <button
          onclick="toggleStyle('btn-open')"
          id="btn-open"
          class="btn btn-soft flex-1 sm:flex-none"
        >
          Open
        </button>
        <button
          onclick="toggleStyle('btn-closed')"
          id="btn-closed"
          class="btn btn-soft flex-1 sm:flex-none"
        >
          Closed
        </button>
      </div>

      <div id="all-issue-card" class="w-full shadow-sm rounded-lg p-4 sm:p-6">
        <div class="flex flex-col sm:flex-row justify-between bg-slate-50 border-b-0 mb-6 gap-4">
          <div class="flex gap-2 items-center">
            <div
              class="bg-[#ece4ff] rounded-full min-w-12 h-12 flex items-center justify-center"
            >
              <img src="./assets/Aperture.png" alt="" class="" />
            </div>
            <div>
              <p id="total-issues" class="font-semibold text-xl">50 Issues</p>
              <p class="font-normal text-sm sm:text-base text-[#64748b]">
                Track and manage your project issues
              </p>
            </div>
          </div>
          <div class="flex gap-4 sm:items-center">
            <div class="flex items-center gap-2">
              <div class="bg-[#00A96E] w-3 h-3 rounded-full"></div>
              <p class="text-base font-medium">Open</p>
            </div>
            <div class="flex items-center gap-2">
              <div class="bg-[#A855F7] w-3 h-3 rounded-full"></div>
              <p class="text-base font-medium">Closed</p>
            </div>
          </div>
        </div>
        <div
          id="card-section"
          class="bg-[#FBFBFB] grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4"
        ></div>
      </div>
      <div id="spinner" class="flex justify-center items-center h-40 hidden">
        <span class="loading loading-spinner loading-xl"></span>
      </div>
      <dialog id="my_modal_5" class="modal modal-middle">
        <div class="modal-box p-6 sm:p-8 w-11/12 max-w-2xl">
          <div id="issue-details-container"></div>
          <div class="modal-action">
            <form method="dialog">
              <button class="btn btn-primary w-full sm:w-auto">Close</button>
            </form>
          </div>
        </div>
      </dialog>
    </main>
    <script src="./script/script.js"></script>
  </body>
</html>
